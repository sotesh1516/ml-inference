name: ml-inference

services:
  gateway:
    build: 
      context: .
      dockerfile: ./gateway/Dockerfile
    depends_on: #need to replace with healthcheck in the future
      - inference_worker
    ports:
      - "${GATEWAY_APP_PORT}:5000"
  
  inference_worker:
    build: 
      context: .
      dockerfile: ./inference_worker/Dockerfile
    ports: 
      - "${GRPC_SERVER_PORT}:50051"
  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"