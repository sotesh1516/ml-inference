syntax = "proto3"; //language version

package ml.inference.v1; //for namespacing and organization, to avoid conflicts due to Predict...

service InferenceService {
    //define rpc methods using the req and res types
    rpc Predict(PredictRequest) returns (PredictResponse) {}




}

message PredictRequest {
    bytes image = 1;
}

message PredictResponse {
    repeated float output = 1;
}